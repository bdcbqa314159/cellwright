name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (GCC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: macos-latest
            name: macOS (Apple Clang)
            cmake_args: -DCMAKE_BUILD_TYPE=Release
          - os: windows-latest
            name: Windows (MSVC)
            cmake_args: -DCMAKE_BUILD_TYPE=Release

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgtk-3-dev \
            python3-dev

      # ── Python setup ───────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: pip install pyarrow polars pandas numpy pytest

      # ── Cache FetchContent downloads ───────────────────────────
      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: deps-${{ runner.os }}-

      # ── Build ──────────────────────────────────────────────────
      - name: Configure
        run: cmake -B build ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Test ───────────────────────────────────────────────────
      - name: C++ tests
        run: ctest --test-dir build --config Release --output-on-failure

      - name: Python tests
        run: python -m pytest tests/python -v
